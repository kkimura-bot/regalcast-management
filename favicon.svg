<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Clock face -->
  <circle cx="16" cy="16" r="15" fill="#2563EB"/>
  <circle cx="16" cy="16" r="13" fill="white"/>
  <!-- Hour marks -->
  <rect x="15.2" y="4"  width="1.6" height="3" rx="0.8" fill="#0F172A"/>
  <rect x="15.2" y="25" width="1.6" height="3" rx="0.8" fill="#0F172A"/>
  <rect x="4"  y="15.2" width="3" height="1.6" rx="0.8" fill="#0F172A"/>
  <rect x="25" y="15.2" width="3" height="1.6" rx="0.8" fill="#0F172A"/>
  <!-- Hour hand (pointing ~10) -->
  <line x1="16" y1="16" x2="11" y2="10" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2) -->
  <line x1="16" y1="16" x2="22" y2="11" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#0F172A"/>
</svg>
