<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ガントデータ投入 — RegalCast Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; background: #F8FAFC; color: #0F172A; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 13px; color: #64748B; margin-bottom: 24px; line-height: 1.6; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #E2E8F0; border-radius: 8px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #2563EB; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { margin-top: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 14px; display: none; }
    .ok  { color: #059669; }
    .err { color: #EF4444; }
  </style>
</head>
<body>
  <h1>📊 ガントデータ投入ツール</h1>
  <p>adminアカウントでログインして「投入する」を押すと、Firestoreに全社ガントの初期データが入ります。<br>一度投入すれば以降はAIKATAがFirestoreを直接更新します。</p>
  <input id="email" type="email" placeholder="メールアドレス">
  <input id="pass"  type="password" placeholder="パスワード">
  <button id="btn" onclick="runSeed()">ログインしてデータを投入する</button>
  <div id="status"></div>

<script type="module">
import { initializeApp }            from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword }
                                     from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getFirestore, doc, setDoc, collection }
                                     from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const app  = initializeApp({
  apiKey:            "AIzaSyCzzyVqRLG_G9kU2qjQ3yx0aznQBKuK4Vg",
  authDomain:        "regalcast-app.firebaseapp.com",
  projectId:         "regalcast-app",
  storageBucket:     "regalcast-app.firebasestorage.app",
  messagingSenderId: "937984277929",
  appId:             "1:937984277929:web:e923791a191d1ffe8718b8",
});
const auth = getAuth(app);
const db   = getFirestore(app);

const log = (msg, cls='') => {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
};

window.runSeed = async () => {
  const btn   = document.getElementById('btn');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  btn.disabled = true;
  btn.textContent = '処理中...';
  document.getElementById('status').innerHTML = '';

  // ── Login ──────────────────────────────────────────────
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    log('✅ ログイン成功', 'ok');
  } catch(e) {
    log('❌ ログイン失敗: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = 'ログインしてデータを投入する'; return;
  }

  const NOW = new Date().toISOString().slice(0,10);

  // ── 1. gantt_config/decisions ───────────────────────────
  try {
    await setDoc(doc(db, 'gantt_config', 'decisions'), {
      updatedAt: NOW,
      items: [
        { priority:'done',   label:'VAULT管理部 — 7月採用確定',     desc:'Koyaが現在担当。7月採用の1人に業務を引き継ぎ。',                                 deadline:'採用：7月着任',  blocker:'SUMMON：採用要件を6月末までに設計', status:'done'  },
        { priority:'done',   label:'アライアンス管理 — STRATAGEM確定', desc:'STRATAGEMが一元管理。児島さんと連携し稼働・業績・契約を数字で管理。',             deadline:'7月〜運用開始',  blocker:'STRATAGEM',                          status:'done'  },
        { priority:'yellow', label:'アライアンス採用チャネル',         desc:'自社採用と別ルートが必要。既存チャネルの有無も含めて。',                           deadline:'2026-06-15', blocker:'SUMMON',                             status:'open'  },
        { priority:'yellow', label:'増員人件費の予算上限',              desc:'ACADEMIA講師・TAVERN店舗・配布パートの採用予算上限。',                             deadline:'2026-06-15', blocker:'SUMMON × STRATAGEM',                 status:'open'  },
        { priority:'green',  label:'リファラル報酬の単価と予算枠',     desc:'制度設計はSUMMON×VAULTで進行可能。Koyaの予算承認のみ。',                         deadline:'2026-06-30', blocker:'SUMMON',                             status:'open'  },
      ]
    });
    log('✅ gantt_config/decisions 投入完了', 'ok');
  } catch(e) { log('❌ decisions エラー: ' + e.message, 'err'); }

  // ── 2. gantt_config/focus_may ──────────────────────────
  try {
    await setDoc(doc(db, 'gantt_config', 'focus_may'), {
      updatedAt: NOW,
      month: '2026年5月',
      items: [
        { label:'キックオフ会議で全部門アクション確定', owner:'AIKATA',              status:'done' },
        { label:'VAULT増員・アライアンス窓口を即決',    owner:'Koya',               status:'done' },
        { label:'体験→入塾の実績集計（KPI再設定起点）', owner:'STRATAGEM×ACADEMIA', status:'wip'  },
        { label:'チラシ最新版制作着手',                 owner:'BEACON',             status:'wip'  },
        { label:'採用チャネル・予算上限の判断',          owner:'Koya',               status:'todo' },
        { label:'宿題リスト回収開始（全部門）',          owner:'STRATAGEM',          status:'wip'  },
        { label:'アライアンス採用チャネル設計',          owner:'SUMMON',             status:'todo' },
      ]
    });
    log('✅ gantt_config/focus_may 投入完了', 'ok');
  } catch(e) { log('❌ focus_may エラー: ' + e.message, 'err'); }

  // ── 3. gantt_sections ──────────────────────────────────
  const sections = [
    { id:'01_decision', order:1, section:'判断', color:'#EF4444', tasks:[
      { label:'VAULT採用(7月着任)',    start:'2026-05-09', end:'2026-07-01', type:'success' },
      { label:'アライアンス管理確定',  start:'2026-05-09', end:'2026-05-10', type:'success' },
      { label:'採用チャネル/予算',     start:'2026-05-15', end:'2026-06-15', type:'crit'    },
      { label:'リファラル予算枠',      start:'2026-06-01', end:'2026-06-30', type:'pending' },
    ]},
    { id:'02_academia', order:2, section:'ACADEMIA', color:'#8B5CF6', tasks:[
      { label:'体験→入塾実績集計',       start:'2026-05-10', end:'2026-05-31', type:'active'  },
      { label:'配布パート採用',           start:'2026-05-15', end:'2026-06-15', type:'active'  },
      { label:'中学生eスポカリキュラム',  start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'校門前配布許可取得',       start:'2026-06-01', end:'2026-06-30', type:'pending' },
      { label:'業務マニュアル作成',       start:'2026-06-01', end:'2026-06-30', type:'pending' },
      { label:'講師増員求人公開',         start:'2026-08-01', end:'2026-08-31', type:'pending' },
    ]},
    { id:'03_dojo', order:3, section:'DOJO', color:'#0EA5E9', tasks:[
      { label:'研修商品仕様2本',     start:'2026-05-10', end:'2026-06-30', type:'active'  },
      { label:'単価/原価試算',       start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'法人LP・事例集',      start:'2026-06-15', end:'2026-07-15', type:'pending' },
      { label:'BAZAAR連携営業',      start:'2026-07-01', end:'2026-09-30', type:'pending' },
    ]},
    { id:'04_arena', order:4, section:'ARENA', color:'#F59E0B', tasks:[
      { label:'大会スケジュール確定', start:'2026-05-10', end:'2026-06-30', type:'active'  },
      { label:'スポンサーメニュー',   start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'配信体制確定',         start:'2026-06-01', end:'2026-06-30', type:'pending' },
      { label:'月4回大会本番',        start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
    { id:'05_bazaar', order:5, section:'BAZAAR', color:'#10B981', tasks:[
      { label:'100社リスト作成',         start:'2026-05-10', end:'2026-06-30', type:'active'  },
      { label:'アライアンス契約テンプレ', start:'2026-05-20', end:'2026-06-30', type:'active'  },
      { label:'法人/通信本番開拓',        start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
    { id:'06_beacon', order:6, section:'BEACON', color:'#F97316', tasks:[
      { label:'チラシ最新版',             start:'2026-05-10', end:'2026-05-31', type:'active'  },
      { label:'コンテンツカレンダー',     start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'LP・CTA整備',             start:'2026-06-01', end:'2026-07-31', type:'pending' },
      { label:'月12本本番運用',           start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
    { id:'07_tavern', order:7, section:'TAVERN', color:'#EC4899', tasks:[
      { label:'現状値把握',         start:'2026-05-10', end:'2026-06-30', type:'active'  },
      { label:'新メニュー試作',     start:'2026-06-01', end:'2026-07-31', type:'pending' },
      { label:'店舗大会(ARENA連動)',start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
    { id:'08_stratagem', order:8, section:'STRATAGEM', color:'#6366F1', tasks:[
      { label:'全部門宿題回答',       start:'2026-05-10', end:'2026-06-30', type:'active'  },
      { label:'KPIシート設計',        start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'数字吸い上げフロー',   start:'2026-06-01', end:'2026-06-30', type:'pending' },
      { label:'KPIモニタリング本番',  start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
    { id:'09_summon', order:9, section:'SUMMON', color:'#14B8A6', tasks:[
      { label:'リファラル制度設計',  start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'採用ペルソナ整備',    start:'2026-06-01', end:'2026-06-30', type:'pending' },
      { label:'採用フロー本番稼働',  start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
    { id:'10_vault', order:10, section:'VAULT', color:'#94A3B8', tasks:[
      { label:'就業規則完成',         start:'2026-05-10', end:'2026-07-31', type:'active'  },
      { label:'契約書テンプレ整備',   start:'2026-05-15', end:'2026-06-30', type:'active'  },
      { label:'学校配布許可フロー',   start:'2026-06-01', end:'2026-06-30', type:'pending' },
      { label:'インシデント記録運用', start:'2026-07-01', end:'2026-12-31', type:'pending' },
    ]},
  ];

  for (const sec of sections) {
    try {
      const { id, ...data } = sec;
      await setDoc(doc(db, 'gantt_sections', id), { ...data, updatedAt: NOW });
      log(`✅ gantt_sections/${id} 投入完了`, 'ok');
    } catch(e) { log(`❌ ${sec.id} エラー: ` + e.message, 'err'); }
  }

  log('\n🎉 全データ投入完了！gantt.html を開いて確認してください。', 'ok');
  btn.textContent = '投入完了';
};
</script>
</body>
</html>
