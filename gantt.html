<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全社実行ガント — RegalCast</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8FAFC; --surface: #FFFFFF; --surface2: #F1F5F9;
      --border: #E2E8F0; --ink: #0F172A; --ink2: #334155; --ink3: #94A3B8;
      --blue: #2563EB; --accent2: #059669; --accent: #EF4444; --warn: #D97706;
      --r-sm: 6px; --r: 10px; --r-lg: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -1px rgba(0,0,0,0.04);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink); font-family:'Inter','Noto Sans JP',-apple-system,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }

    /* ── Header ── */
    .g-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow);
    }
    .g-back { display:flex; align-items:center; gap:5px; color:var(--blue); font-size:13px; font-weight:500; cursor:pointer; text-decoration:none; padding:6px 10px; border-radius:var(--r-sm); transition:background .15s; }
    .g-back:hover { background:rgba(37,99,235,.06); }
    .g-title { flex:1; font-size:15px; font-weight:700; }
    .g-updated { font-size:11px; color:var(--ink3); font-family:'DM Mono',monospace; }
    .g-badge { font-size:11px; font-weight:600; background:var(--surface2); border:1px solid var(--border); padding:3px 10px; border-radius:20px; color:var(--ink2); }

    /* ── Loading / Error ── */
    .g-loading { display:flex; align-items:center; justify-content:center; height:60vh; font-size:14px; color:var(--ink3); }

    /* ── Main container ── */
    .g-main { max-width:1400px; margin:0 auto; padding:24px 20px 60px; }

    /* ── 判断待ちカード ── */
    .decision-section { margin-bottom: 32px; }
    .decision-section h2 { font-size:13px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.08em; font-family:'DM Mono',monospace; margin-bottom:12px; }
    .decision-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:12px; }
    .d-card {
      background: var(--surface); border-radius: var(--r-lg);
      border-left: 4px solid var(--border);
      padding: 14px 16px; box-shadow: var(--shadow);
      transition: box-shadow .15s;
    }
    .d-card:hover { box-shadow: var(--shadow-md); }
    .d-card.red   { border-left-color: var(--accent); }
    .d-card.yellow{ border-left-color: var(--warn); }
    .d-card.green { border-left-color: var(--accent2); }
    .d-card.done  { border-left-color: var(--ink3); opacity: .6; }
    .d-card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .d-priority { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
    .red   .d-priority { background:rgba(239,68,68,.1); color:var(--accent); }
    .yellow .d-priority { background:rgba(217,119,6,.1); color:var(--warn); }
    .green .d-priority { background:rgba(5,150,105,.1); color:var(--accent2); }
    .done  .d-priority { background:var(--surface2); color:var(--ink3); }
    .d-deadline { font-size:11px; color:var(--ink3); font-family:'DM Mono',monospace; margin-left:auto; }
    .d-title { font-size:13px; font-weight:600; line-height:1.4; margin-bottom:4px; }
    .d-desc { font-size:11px; color:var(--ink2); line-height:1.6; }
    .d-blocker { font-size:10px; color:var(--ink3); margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }

    /* ── 今月フォーカス ── */
    .focus-section { margin-bottom:32px; }
    .focus-section h2 { font-size:13px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.08em; font-family:'DM Mono',monospace; margin-bottom:12px; }
    .focus-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:10px; }
    .f-item {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      padding:12px 14px; display:flex; align-items:center; gap:10px; font-size:13px;
    }
    .f-item.done-item { opacity:.5; }
    .f-status { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
    .f-status.todo  { border:2px solid var(--border); background:transparent; }
    .f-status.wip   { background:rgba(37,99,235,.12); color:var(--blue); font-size:12px; }
    .f-status.done  { background:rgba(5,150,105,.12); color:var(--accent2); font-size:12px; }
    .f-label { flex:1; line-height:1.4; }
    .f-owner { font-size:10px; color:var(--ink3); }

    /* ── ガントチャート ── */
    .gantt-section { margin-bottom:32px; }
    .gantt-section h2 { font-size:13px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.08em; font-family:'DM Mono',monospace; margin-bottom:12px; }
    .gantt-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--shadow); overflow:hidden; }
    .gantt-scroll { overflow-x:auto; }
    .gantt-inner { min-width:800px; }

    /* 月ヘッダー */
    .gantt-months { display:flex; border-bottom:1px solid var(--border); }
    .gantt-label-col { width:160px; flex-shrink:0; border-right:1px solid var(--border); }
    .gantt-bars-col { flex:1; position:relative; display:flex; }
    .gantt-month {
      flex:1; padding:8px 6px; font-size:10px; font-weight:700; color:var(--ink2);
      font-family:'DM Mono',monospace; text-align:center; letter-spacing:.05em;
      border-right:1px solid var(--border); background:var(--surface2);
    }
    .gantt-month:last-child { border-right:none; }

    /* 今日マーカー */
    .today-line { position:absolute; top:0; bottom:0; width:2px; background:rgba(239,68,68,.5); z-index:5; pointer-events:none; }
    .today-label { position:absolute; top:0; font-size:9px; font-weight:700; color:var(--accent); font-family:'DM Mono',monospace; transform:translateX(-50%); padding:2px 4px; background:rgba(239,68,68,.1); border-radius:3px; }

    /* セクション行 */
    .gantt-section-header {
      display:flex; align-items:center; border-bottom:1px solid var(--border);
      background:var(--surface2);
    }
    .gantt-section-label {
      width:160px; flex-shrink:0; padding:6px 12px;
      font-size:11px; font-weight:700; color:var(--ink2);
      border-right:1px solid var(--border);
    }
    .gantt-section-bar-area { flex:1; height:20px; position:relative; }

    /* タスク行 */
    .gantt-task-row { display:flex; border-bottom:1px solid var(--border); }
    .gantt-task-row:last-child { border-bottom:none; }
    .gantt-task-label {
      width:160px; flex-shrink:0; padding:5px 12px 5px 20px;
      font-size:11px; color:var(--ink2); border-right:1px solid var(--border);
      display:flex; align-items:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .gantt-task-area { flex:1; height:28px; position:relative; }
    .gantt-bar {
      position:absolute; top:5px; height:18px; border-radius:4px;
      display:flex; align-items:center; padding:0 6px;
      font-size:9px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden;
      cursor:default; transition:opacity .15s;
    }
    .gantt-bar:hover { opacity:.85; }
    .gantt-bar.crit    { background:var(--accent); }
    .gantt-bar.active  { background:var(--blue); }
    .gantt-bar.done    { background:var(--ink3); }
    .gantt-bar.success { background:var(--accent2); }
    .gantt-bar.pending { background:#8B5CF6; }

    /* milestone */
    .gantt-milestone {
      position:absolute; top:4px; width:16px; height:16px;
      background:var(--warn); border-radius:3px; transform:rotate(45deg);
      cursor:default;
    }

    /* グリッド線 */
    .gantt-grid-lines { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; display:flex; }
    .gantt-grid-line { border-right:1px dashed var(--border); }

    /* ── 進捗テーブル ── */
    .progress-section { margin-bottom:32px; }
    .progress-section h2 { font-size:13px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.08em; font-family:'DM Mono',monospace; margin-bottom:12px; }
    .progress-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:10px; }
    .p-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      padding:12px 14px;
    }
    .p-dept { font-size:12px; font-weight:700; margin-bottom:8px; }
    .p-bar-wrap { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:4px; }
    .p-bar { height:100%; border-radius:3px; background:var(--blue); transition:width .4s ease; }
    .p-stats { font-size:10px; color:var(--ink3); font-family:'DM Mono',monospace; }
  </style>
</head>

// ── Helpers ───────────────────────────────────────────────
function dayDiff(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function pct(dateStr) {
  const d = new Date(dateStr);
  if (d < GANTT_START) return 0;
  if (d > GANTT_END) return 100;
  return Math.min(100, Math.max(0, dayDiff(GANTT_START, d) / GANTT_DAYS * 100));
}

// ── Render ────────────────────────────────────────────────
function renderAll() {
  renderDecisions();
  renderFocus();
  renderProgress();
  renderGantt();
}

function renderDecisions() {
  const el = document.getElementById('decision-cards');
  el.innerHTML = DECISIONS.map(d => {
    const cls = d.status === 'done' ? 'done' : d.priority;
    const pLabel = d.status === 'done' ? '✅ 確定' : d.priority === 'red' ? '🔴 最優先' : d.priority === 'yellow' ? '🟡 高' : '🟢 中';
    return `
    <div class="d-card ${cls}">
      <div class="d-card-top">
        <span class="d-priority">${pLabel}</span>
        <span class="d-deadline">${d.deadline}</span>
      </div>
      <div class="d-title">${d.label}</div>
      <div class="d-desc">${d.desc}</div>
      <div class="d-blocker">担当: ${d.blocker}</div>
    </div>`;
  }).join('');
}

function renderFocus() {
  const el = document.getElementById('focus-grid');
  el.innerHTML = FOCUS_MAY.map(f => {
    const icon = f.status === 'done' ? '✓' : f.status === 'wip' ? '⟳' : '';
    return `
    <div class="f-item ${f.status === 'done' ? 'done-item' : ''}">
      <div class="f-status ${f.status}">${icon}</div>
      <div>
        <div class="f-label">${f.label}</div>
        <div class="f-owner">${f.owner}</div>
      </div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const el = document.getElementById('progress-grid');
  el.innerHTML = PROGRESS.map(p => {
    const pct = p.total ? Math.round(p.done / p.total * 100) : 0;
    return `
    <div class="p-card">
      <div class="p-dept">${p.dept}</div>
      <div class="p-bar-wrap"><div class="p-bar" style="width:${pct}%"></div></div>
      <div class="p-stats">${p.done} / ${p.total} 完了 (${pct}%)</div>
    </div>`;
  }).join('');
}

function renderGantt() {
  const el = document.getElementById('gantt-inner');

  // 月ヘッダー
  const monthCols = MONTHS.map(m => {
    const w = m.days / GANTT_DAYS * 100;
    return `<div class="gantt-month" style="flex:0 0 ${w}%">${m.label}</div>`;
  }).join('');

  // 今日マーカー
  const todayPct = pct('2026-05-09');
  const todayMarker = `
    <div class="today-line" style="left:${todayPct}%"></div>
    <div class="today-label" style="left:${todayPct}%">今日</div>`;

  // グリッド線（月境界）
  let gridX = 0;
  const gridLines = MONTHS.map(m => {
    gridX += m.days / GANTT_DAYS * 100;
    return `<div class="gantt-grid-line" style="flex:0 0 ${m.days / GANTT_DAYS * 100}%"></div>`;
  }).join('');

  // セクション＋タスク行
  const rows = GANTT_SECTIONS.map(sec => {
    const taskRows = sec.tasks.map(t => {
      const left  = pct(t.start);
      const right = pct(t.end);
      const width = Math.max(0.5, right - left);
      return `
      <div class="gantt-task-row">
        <div class="gantt-task-label" title="${t.label}">${t.label}</div>
        <div class="gantt-task-area" style="position:relative">
          <div class="gantt-grid-lines">${gridLines}</div>
          ${todayMarker}
          <div class="gantt-bar ${t.type}" style="left:${left}%;width:${width}%" title="${t.label}"></div>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="gantt-section-header">
      <div class="gantt-section-label" style="border-left:3px solid ${sec.color}">${sec.section}</div>
      <div class="gantt-section-bar-area"></div>
    </div>
    ${taskRows}`;
  }).join('');

  el.innerHTML = `
    <div class="gantt-months">
      <div class="gantt-label-col"></div>
      <div class="gantt-bars-col">${monthCols}</div>
    </div>
    ${rows}`;
}

// ── Utilities ─────────────────────────────────────────────
function dayDiff(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
</script>
</body>
</html>
